<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCA Student Portal - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="navbar">
      <div class="navbar-brand">🎓 BCA Portal</div>
      <div class="navbar-links">
        <a href="#profile">My Profile</a>
        <button id="logoutBtn" style="padding: 8px 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500;">Logout</button>
      </div>
    </div>

    <div class="welcome-card">
      <h1 id="welcomeMessage">Welcome, User 👋</h1>
      <p>Welcome to the BCA Student Portal 🎓</p>
      <p>You have successfully logged in.</p>
    </div>

    <div class="card">
      <h2 style="color: white; margin-bottom: 20px;">📋 Your Profile</h2>
      
      <div style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; margin-bottom: 15px;">
        <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 5px;">Email</p>
        <p style="color: white; font-size: 16px;" id="userEmail">Loading...</p>
      </div>

      <div style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; margin-bottom: 15px;">
        <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 5px;">Course</p>
        <p style="color: white; font-size: 16px;" id="userCourse">Loading...</p>
      </div>

      <div style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px;">
        <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 5px;">Registration Date</p>
        <p style="color: white; font-size: 16px;" id="registrationDate">Loading...</p>
      </div>
    </div>

    <div class="footer">
      Made by Vishal Kumar, BCA Student, 2nd Semester
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
